x-otp: &x-otp
  build:
    context: docker/otp
  image: ghcr.io/cartoway/router-api-otp:${CARTOROUTE_VERSION:-master}
  ports:
    - "7001:7000"
  volumes:
    - ./docker/otp/data:/srv/otp/data
  restart: unless-stopped

services:
  api:
    depends_on:
      - otp

  otp:
    <<: *x-otp
    environment:
      GRAPH: bordeaux
