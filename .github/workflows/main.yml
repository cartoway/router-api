name: CI test

on:
  push:
    branches: [master, dev]
    tags:
      - 'v*'
  pull_request:
    branches: [master, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Add system package
        run: sudo apt install -y libsqlite3-mod-spatialite

      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.0"
          bundler-cache: true

      # - name: Run tests
      #   env:
      #     DISABLED_WRAPPERS: graphhopper,here8,osrm,otp
      #   run: bundle exec rake test

  docker-api:
    runs-on: ubuntu-latest
    needs: [tests]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev' || startsWith(github.event.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Docker Build and Push API
        uses: cartoway/docker-compose-build-push-action@main
        with:
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          project: cartoway/router-api
          service: api

  docker-osrm:
    runs-on: ubuntu-latest
    needs: [tests]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev' || startsWith(github.event.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Docker Build and Push OSRM
        if: vars.OSRM_BUILD
        uses: cartoway/docker-compose-build-push-action@main
        with:
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          project: cartoway/router-api-osrm
          compose_file: |
            docker-compose.yml
            docker-compose-osrm.yml
          service: osrm

  docker-graphhopper:
    runs-on: ubuntu-latest
    needs: [tests]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev' || startsWith(github.event.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Docker Build and Push GraphHopper
        if: vars.GRAPHOPPER_BUILD
        uses: cartoway/docker-compose-build-push-action@main
        with:
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          project: cartoway/router-api-graphhopper
          compose_file: |
            docker-compose.yml
            docker-compose-graphhopper.yml
          service: graphhopper

  docker-otp:
    runs-on: ubuntu-latest
    needs: [tests]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev' || startsWith(github.event.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Docker Build and Push OTP
        if: vars.OTP_BUILD
        uses: cartoway/docker-compose-build-push-action@main
        with:
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          project: cartoway/router-api-otp
          compose_file: |
            docker-compose.yml
            docker-compose-otp.yml
          service: otp
